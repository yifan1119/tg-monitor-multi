# tg-monitor-multi — Docker Compose (主推部署方式)
#
# Multi-instance 支持 (向下兼容):
#   未设 INSTANCE       → tg-monitor-multi / 原行为 (现有部署无需改)
#   INSTANCE=ivan       → tg-monitor-multi-ivan      (另一份, 完全独立)
#   INSTANCE=client-a   → tg-monitor-multi-client-a
#
# INSTANCE_SUFFIX 由 install.sh 算好写入 .env:
#   INSTANCE 空        → INSTANCE_SUFFIX=""
#   INSTANCE=xxx       → INSTANCE_SUFFIX="-xxx"
#
# 用法:
#   docker compose up -d --build        # 首次 / 升級後 rebuild
#   docker compose logs -f              # 看 log
#   docker compose restart              # 重啟容器
#   docker compose down                 # 停止 (資料不刪, volume 保留)
#   docker compose down -v              # 停止 + 清 volume (危險! 會刪 depts/)

name: tg-monitor-multi${INSTANCE_SUFFIX:-}

services:
  tg-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: tg-monitor-multi${INSTANCE_SUFFIX:-}:local
    container_name: tg-monitor-multi${INSTANCE_SUFFIX:-}
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-5003}:5003"

    volumes:
      # 代碼目錄 bind mount — git pull 後 docker compose restart 就生效, 不必 --build
      # (只有 Dockerfile / package.json 改了才需要 rebuild)
      - ./web:/app/web
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - ./VERSION:/app/VERSION:ro
      # .git mount: Web「检查更新」在容器内跑 git fetch, 不 mount .git 就永远
      # 比对 image 里的旧 HEAD, 显示"落后 N 个 commit"怎么拉都不降
      - ./.git:/app/.git
      # 用戶資料 (絕不能進 image, volume mount 保留升級)
      - ./depts:/app/depts
      - ./global:/app/global
      - ./data:/app/data
      # Google SA 單檔 mount — 必須在 ./shared mount 之後, 才能 overlay 上去
      # (install.sh 會先在 secrets/ 放佔位檔)
      - ./secrets/google-service-account.json:/app/shared/google-service-account.json
      # 備份 + 健康檢查 log
      - ./.backups:/app/.backups
      - ./.healthcheck:/app/.healthcheck

    environment:
      NODE_ENV: production
      DATA_PROVIDER: real
      WEB_PORT: 5003
      TG_MONITOR_MULTI_DOCKER: "1"
      # 宿主機安裝目錄 (從 .env 讀, install.sh 自動寫入).
      # Web「檢查更新」會顯示「cd <這個路徑> && bash scripts/update.sh」給用戶.
      HOST_INSTALL_DIR: "${HOST_INSTALL_DIR:-/opt/tg-monitor-multi}"
      # 实例名 (multi-instance 场景, /settings 和 metrics API 会露出).
      INSTANCE: "${INSTANCE:-}"

    # 若容器內 setup 要加 cron 健康檢查, 用宿主機的 pm2 直接跑, 這裡不需要
    # (單容器自給自足, 不依賴宿主機 pm2)

    # 記憶體限制 (避免失控吃光 VPS)
    # 需要時取消註解:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Caddy 反代 — 给 Web 自动套 HTTPS + Let's Encrypt 证书
  # 只在 .env 里配了 PUBLIC_DOMAIN 才需要 (走 `--profile https` 启动)
  # 启用: bash scripts/enable-https.sh   (脚本帮你配 .env + 拉起这个容器)
  caddy:
    image: caddy:2-alpine
    container_name: tg-monitor-multi-caddy${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      TZ: Asia/Shanghai
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      UPSTREAM: tg-monitor-multi${INSTANCE_SUFFIX:-}:5003

volumes:
  caddy_data:
  caddy_config:
